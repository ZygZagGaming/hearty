name: Bump version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Select the version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      latest:
        description: 'Release as latest'
        required: true
        default: true
        type: boolean


jobs:
  bump-version:
    runs-on: ubuntu-latest

    # Permissions needed to push the version changes back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          CURRENT_VERSION=$(grep -E "^mod_version=" gradle.properties | cut -d'=' -f2)
          LOADER=$(grep -E "^loader=" gradle.properties | cut -d'=' -f2)
          MC_VERSION=$(grep -E "^mc_version=" gradle.properties | cut -d'=' -f2)
          echo "Current version: $CURRENT_VERSION"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          BUMP_TYPE="${{ inputs.bump_type }}"
          if [ "$BUMP_TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP_TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "$BUMP_TYPE" = "patch" ]; then
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          sed -i "s/^mod_version=.*/mod_version=$NEW_VERSION/" gradle.properties
          git add gradle.properties
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          echo "NEW_TAG=$LOADER-$MC_VERSION-$NEW_VERSION" >> $GITHUB_ENV
          echo "OLD_TAG=$LOADER-$MC_VERSION-$CURRENT_VERSION" >> $GITHUB_ENV
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "MC_VERSION=$MC_VERSION" >> $GITHUB_ENV
      - name: Push changes
        run: |
          git push origin ${{ github.ref_name }}
          git tag ${{ env.NEW_TAG }}
          git push origin ${{ env.NEW_TAG }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: Hearty ${{ env.NEW_VERSION }} for Neoforge ${{ env.MC_VERSION }}
          body: |
            ## What's New
            <https://github.com/ZygZagGaming/hearty/compare/${{ env.OLD_TAG }}...${{ env.NEW_TAG }}>
          draft: false
          prerelease: false
          make_latest: ${{ inputs.mark_latest }}
          token: ${{ secrets.ACTIONS_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}